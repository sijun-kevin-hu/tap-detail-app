name: Deploy Firestore Rules

on:
  push:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firebase.json"
      - ".firebaserc"
  workflow_dispatch: {}

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account credentials
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "${RUNNER_TEMP}/firebase-sa.json"

      - name: Deploy Firestore rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: firebase deploy --only firestore:rules --project production --non-interactive
